name: Gemma GPU CI/CD

on:
  push:
    branches:
      - "**"
  pull_request:

permissions:
  contents: read
  id-token: write  

jobs:
  lint:
    name: Lint & Validate
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Check Terraform Formatting
        working-directory: terraform/dev
        run: terraform fmt -check -recursive

      - name: Initialize Terraform
        working-directory: terraform/dev
        run: terraform init -backend=false

      - name: Validate Terraform Configuration
        working-directory: terraform/dev
        run: terraform validate

      - name: Setup Helm
        uses: azure/setup-helm@v4

      - name: Lint Helm Chart
        run: helm lint helm/gemma-vllm

  build:
    name: Build & Push Image
    needs: lint
    runs-on: ubuntu-24.04

    env:
      PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
      GAR_LOCATION: asia-south1
      REPOSITORY: llm-images
      IMAGE_NAME: gemma-vllm

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.SERVICE_ACCOUNT }}

      - name: Setup Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker Authentication
        run: |
          gcloud auth configure-docker asia-south1-docker.pkg.dev --quiet

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker Image
        run: |
          docker build \
            -t asia-south1-docker.pkg.dev/$PROJECT_ID/$REPOSITORY/$IMAGE_NAME:${{ github.sha }} \
            ./app      

      - name: Trivy Scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: asia-south1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/llm-images/gemma-vllm:${{ github.sha }}
          format: table
          exit-code: 0
          ignore-unfixed: true
          severity: HIGH,CRITICAL

      - name: Push Image
        run: |
          docker push \
            asia-south1-docker.pkg.dev/$PROJECT_ID/$REPOSITORY/$IMAGE_NAME:${{ github.sha }}      

  deploy:
    name: Deploy
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-24.04

    env:
      PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
      CLUSTER_NAME: ${{ secrets.CLUSTER_NAME }}
      CLUSTER_ZONE: ${{ secrets.CLUSTER_ZONE }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.SERVICE_ACCOUNT }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Install kubectl
        run: |
          gcloud components install kubectl gke-gcloud-auth-plugin --quiet

      - name: Get Credentials
        run: |
          gcloud container clusters get-credentials \
            $CLUSTER_NAME \
            --zone $CLUSTER_ZONE \
            --project $PROJECT_ID

      - name: Setup Helm
        uses: azure/setup-helm@v4

      - name: Deploy
        run: |
          helm upgrade --install gemma-vllm ./helm/gemma-vllm \
            --set image.repository=asia-south1-docker.pkg.dev/$PROJECT_ID/llm-images/gemma-vllm \
            --set image.tag=${{ github.sha }} \
            --set hfToken="${{ secrets.HF_TOKEN }}"          