apiVersion: v1
kind: Service

metadata:
  name: {{ .Chart.Name }}

  labels:
    app.kubernetes.io/name: {{ .Chart.Name }}
    app.kubernetes.io/version: {{ .Chart.AppVersion | quote }}

spec:
  type: {{ .Values.service.type }}

  selector:
    app: {{ .Chart.Name }}

  ports:
    - name: http
      protocol: TCP
      port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.port }}